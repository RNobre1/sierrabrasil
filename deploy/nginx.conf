# O Agente — Nginx config (producao)
# Dominio: oagente.io / app.oagente.io
# Droplet: 159.203.88.15 (oagente-app)
# SSL gerenciado pelo Certbot

limit_req_zone $binary_remote_addr zone=app:10m rate=30r/s;

server {
    listen 80;
    server_name oagente.io www.oagente.io app.oagente.io;

    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    server_name oagente.io www.oagente.io app.oagente.io;

    root /var/www/oagente;
    index index.html;

    # SSL — certbot preenche automaticamente
    # ssl_certificate /etc/letsencrypt/live/oagente.io/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/oagente.io/privkey.pem;

    # Security headers
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://*.supabase.co; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: blob: https:; connect-src 'self' https://*.supabase.co wss://*.supabase.co https://openrouter.ai https://accounts.google.com https://*.googleapis.com; frame-src https://accounts.google.com;" always;

    # Rate limiting
    limit_req zone=app burst=50 nodelay;

    # Gzip
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript image/svg+xml;

    # Cache static assets (Vite adds hash to filenames)
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # SPA — all routes serve index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Block hidden files
    location ~ /\. {
        deny all;
        return 404;
    }
}
